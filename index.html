<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Félicitations Jad - Papa du petit mystère !</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');
        body {
            margin: 0; padding: 0; overflow: hidden;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ffff00, #ff0000, #00ff00, #0000ff);
            background-size: 400% 400%;
            animation: rainbow 5s ease infinite;
            font-family: 'Comic Neue', cursive;
            color: #fff; text-align: center;
            height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .disco-ball {
            position: fixed; top: 18%; left: 50%;
            transform: translate(-50%, -50%);
            width: 160px; height: 160px;
            background: radial-gradient(circle, #fff 10%, #ffd700 20%, #ff4500 30%, #ff1493 40%, transparent 50%);
            border-radius: 50%;
            animation: rotate 10s linear infinite, shine 2s ease-in-out infinite alternate;
            box-shadow: 0 0 50px #fff, inset 0 0 50px rgba(255,255,255,0.5);
            z-index: 10;
        }
        @keyframes rotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes shine {
            0% { box-shadow: 0 0 50px #fff, inset 0 0 50px rgba(255,255,255,0.5); }
            100% { box-shadow: 0 0 100px #ffff00, inset 0 0 100px #ffff00; }
        }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        h1 {
            font-size: 3.5em;
            text-shadow: 0 0 20px #fff, 0 0 40px #ff00ff, 0 0 60px #00ffff;
            animation: glow 2s ease-in-out infinite alternate;
            margin: 0 0 5px 0; z-index: 20;
        }
        @keyframes glow {
            from { text-shadow: 0 0 20px #fff, 0 0 40px #ff00ff, 0 0 60px #00ffff; }
            to { text-shadow: 0 0 30px #fff, 0 0 60px #ffff00, 0 0 90px #00ff00; }
        }
        .date {
            font-size: 1.6em; color: #ffff00;
            text-shadow: 0 0 20px #ff0000;
            animation: pulse 1.5s infinite;
            margin: 5px 0; z-index: 20;
        }
        @keyframes pulse {
            0% { transform: scale(1); } 50% { transform: scale(1.07); } 100% { transform: scale(1); }
        }
        /* ZONE OR */
        .gold-zone {
            position: relative;
            display: inline-block;
            margin: 20px 0;
            cursor: pointer;
            z-index: 20;
            width: 340px;
        }
        .gold-cover {
            width: 100%;
            padding: 22px 15px;
            box-sizing: border-box;
            background: linear-gradient(135deg, #ffd700, #ffed4e, #ffa500, #ffd700);
            border: 6px solid #ffaa00;
            border-radius: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: bold;
            color: #6b3a00;
            text-shadow: 1px 1px 3px rgba(255,255,255,0.6);
            box-shadow: 0 10px 35px rgba(255,215,0,0.9), inset 0 5px 12px rgba(255,255,255,0.7);
            animation: goldShine 3s ease-in-out infinite alternate;
            user-select: none;
        }
        @keyframes goldShine {
            from { box-shadow: 0 10px 35px rgba(255,215,0,0.9), inset 0 5px 12px rgba(255,255,255,0.7); }
            to { box-shadow: 0 20px 55px rgba(255,215,0,1), inset 0 12px 22px rgba(255,255,255,0.95); }
        }
        .gold-cover .teasing {
            font-size: 1.1em;
            line-height: 1.4;
        }
        .gold-cover .instruction-or {
            font-size: 1em;
            opacity: 0.85;
        }
        /* PRÉNOM : caché par défaut, affiché APRÈS reveal au-dessus HORS zone */
        .prenom-revele {
            display: none;
            margin-top: 15px;
            font-size: 4em;
            font-weight: bold;
            color: #ff00ff;
            text-shadow: 0 0 40px #ffff00, 0 0 60px #ff1493, 0 0 80px #00ffff;
            animation: prenomPulse 1s infinite;
            z-index: 30;
        }
        @keyframes prenomPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .bas-page {
            font-size: 1.3em;
            text-shadow: 0 0 10px #fff;
            margin: 10px 0;
            z-index: 20;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .music-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(255,255,255,0.2);
            border: 3px solid #ffff00; border-radius: 50%;
            width: 60px; height: 60px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5em;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease; z-index: 50;
        }
    </style>
</head>
<body>
    <canvas id="sparkles"></canvas>
    <div class="disco-ball"></div>
    <h1>🎉 FÉLICITATIONS JAD ! 🎉</h1>
    <p class="date">Papa du bébé né le 12 avril 2026 👶</p>

    <div class="gold-zone" id="goldZone">
        <div class="gold-cover">
            <div class="teasing">✨ Vous allez découvrir<br>le magnifique prénom<br>de cet enfant ✨</div>
            <div class="instruction-or">👆 Touchez la zone en OR ! 👆</div>
        </div>
    </div>

    <div class="prenom-revele" id="prenomRevele">PAUL 🌟</div>

    <p class="bas-page">Le plus beau bébé du monde t'attend ! 💖🍼</p>

    <button class="music-btn" id="musicBtn">🎵</button>
    <audio id="bgMusic" loop preload="auto" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <script>
        const canvas = document.getElementById('sparkles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const sparkles = [];
        for (let i = 0; i < 150; i++) {
            sparkles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2, life: Math.random()*2});
        }
        function animateSparkles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            sparkles.forEach(s => {
                ctx.save();
                ctx.translate(s.x, s.y);
                ctx.rotate(s.life * Math.PI);
                ctx.fillStyle = `hsl(${s.life*60},100%,70%)`;
                ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
                ctx.fillRect(-3, -3, 6, 6);
                ctx.restore();
                s.x += s.vx; s.y += s.vy; s.life += 0.05;
                if (s.life > 2 || s.x < 0 || s.x > canvas.width || s.y < 0 || s.y > canvas.height) {
                    s.x = Math.random()*canvas.width; s.y = Math.random()*canvas.height;
                    s.vx = (Math.random()-0.5)*2; s.vy = (Math.random()-0.5)*2; s.life = 0;
                }
            });
            requestAnimationFrame(animateSparkles);
        }
        animateSparkles();
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        const goldZone = document.getElementById('goldZone');
        const prenomRevele = document.getElementById('prenomRevele');
        let revealed = false;

        function revealPrenom() {
            if (!revealed) {
                revealed = true;
                prenomRevele.style.display = 'block';
                if (navigator.vibrate) navigator.vibrate(300);
                for (let i = 0; i < 120; i++) {
                    setTimeout(() => {
                        const idx = Math.floor(Math.random()*sparkles.length);
                        sparkles[idx].vx = (Math.random()-0.5)*8;
                        sparkles[idx].vy = (Math.random()-0.5)*8;
                        sparkles[idx].life = 0;
                    }, i * 20);
                }
            }
        }

        goldZone.addEventListener('click', revealPrenom);
        let startX, startY, isDragging = false;
        goldZone.addEventListener('touchstart', e => {
            e.preventDefault();
            startX = e.touches[0].clientX; startY = e.touches[0].clientY;
            revealPrenom();
        }, {passive: false});
        goldZone.addEventListener('touchmove', e => {
            if (!revealed && startX && (Math.abs(e.touches[0].clientX-startX)>15 || Math.abs(e.touches[0].clientY-startY)>15)) revealPrenom();
        });
        goldZone.addEventListener('mousedown', () => isDragging = true);
        document.addEventListener('mousemove', () => { if (isDragging && !revealed) revealPrenom(); });
        document.addEventListener('mouseup', () => isDragging = false);

        const musicBtn = document.getElementById('musicBtn');
        const bgMusic = document.getElementById('bgMusic');
        bgMusic.volume = 0.3;
        let isPlaying = false;
        musicBtn.addEventListener('click', async () => {
            try {
                if (isPlaying) { bgMusic.pause(); musicBtn.textContent = '🎵'; }
                else { await bgMusic.play(); musicBtn.textContent = '⏸️'; }
                isPlaying = !isPlaying;
            } catch(e) {}
        });
    </script>
</body>
</html>
